services:
  backend:
    image: media-backend
    build: .
    volumes:
      - .:/usr/src/app
    ports:
      - 3001:3001
    environment:
      - MONGODB_URL=mongodb://root:example@database:27017/
      - TEST_MONGODB_URL=mongodb://root:example@database:27017/testdb?authSource=admin
    depends_on:
      - database
  database:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example